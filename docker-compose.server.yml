# ── Server deployment compose (dev / prod EC2) ────────────────────────────────
# Usage: docker compose -f docker-compose.server.yml up -d
# 환경별 IMAGE_TAG / SPRING_PROFILES_ACTIVE 는 .env 에서 주입

services:
  # ── Redis (refresh token 저장) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # maxmemory 상한 + LRU — refresh token 저장이 무한 증식하지 않도록 (메모리 다이어트 ADR 0053)
    command: redis-server --appendonly yes --maxmemory 96mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MySQL ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    # 메모리 다이어트 (ADR 0053): performance_schema off 로 ~150-200MB 절약,
    # buffer pool·connection 을 t3.small 에 맞게 명시. DNS 역조회 비활성으로 접속 지연·메모리↓
    command:
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=128M
      - --max-connections=60
      - --skip-name-resolve
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-palette}
      MYSQL_USER: ${MYSQL_USERNAME:-palette}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    expose:
      - "3306"
    # 127.0.0.1 바인딩 — EC2 localhost 에서만 접근 가능, 인터넷 X
    # 로컬에서 DataGrip 등으로 붙으려면 SSH 터널 사용
    ports:
      - "127.0.0.1:3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USERNAME:-palette}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    image: ghcr.io/c-yeonwoo/palette-api:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      REDIS_HOST: redis      # docker compose 서비스명
      REDIS_PORT: 6379
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # MySQL 연결 + 시더 실행 시간 여유

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/c-yeonwoo/palette-frontend:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro     # Let's Encrypt 인증서
      - /var/www/certbot:/var/www/certbot:ro      # ACME challenge 디렉토리
      - ./nginx-server.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
