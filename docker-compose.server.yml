# ── Server deployment compose (dev / prod EC2) ────────────────────────────────
# Usage: docker compose -f docker-compose.server.yml up -d
# 환경별 IMAGE_TAG / SPRING_PROFILES_ACTIVE 는 .env 에서 주입

services:
  # ── MySQL ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-palette}
      MYSQL_USER: ${MYSQL_USERNAME:-palette}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    expose:
      - "3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USERNAME:-palette}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    image: ghcr.io/c-yeonwoo/palette-api:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # MySQL 연결 + 시더 실행 시간 여유

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/c-yeonwoo/palette-frontend:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certbot SSL certs (도메인 연결 후 주석 해제)
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx-server.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
