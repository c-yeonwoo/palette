openai.api-key=test-key
openai.model=gpt-4o
sms.provider=mock
payment.gateway=mock
aws.s3.enabled=false

# Test-only in-memory H2 (prevents file-lock conflicts with running app instances)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Disable H2 console in tests
spring.h2.console.enabled=false

# JWT secret for tests
jwt.secret=test-secret-key-minimum-256-bits-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

# Kakao OAuth2 test credentials
spring.security.oauth2.client.registration.kakao.client-id=test-kakao-id
spring.security.oauth2.client.registration.kakao.client-secret=test-kakao-secret
