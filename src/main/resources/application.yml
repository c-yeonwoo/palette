server:
  port: 8080

spring:
  application:
    name: palette

  # Database Configuration
  datasource:
    url: jdbc:h2:file:./data/palettedb;AUTO_SERVER=TRUE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
              - account_email
              - name
              - birthday
              - birthyear
              - gender
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# JWT Configuration
jwt:
  # JWT_SECRET must be set via environment variable. No fallback is provided intentionally.
  # Generate with: openssl rand -base64 64
  secret: ${JWT_SECRET}
  access-token-expiry: 3600       # 1 hour in seconds
  refresh-token-expiry: 2592000   # 30 days in seconds

# App Configuration
app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
  base-url: ${APP_BASE_URL:http://localhost:8080}

# AWS S3 Configuration
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:palette-data-v1}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:dummy-access-key}
    secret-key: ${AWS_SECRET_ACCESS_KEY:dummy-secret-key}

# NCP SENS SMS Configuration
ncp:
  sens:
    access-key: ${NCP_SENS_ACCESS_KEY:dummy-access-key}
    secret-key: ${NCP_SENS_SECRET_KEY:dummy-secret-key}
    service-id: ${NCP_SENS_SERVICE_ID:dummy-service-id}
    from-number: ${NCP_SENS_FROM_NUMBER:01000000000}

# NICE 본인인증 API v2.0
# 미설정 시 DEV bypass 모드로 동작 (NICE 팝업 없이 수동 입력)
nice:
  client-id: ${NICE_CLIENT_ID:}
  client-secret: ${NICE_CLIENT_SECRET:}
  product-id: ${NICE_PRODUCT_ID:2101979031}

# Logging
logging:
  level:
    kr.ai.palette: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
