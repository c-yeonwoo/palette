server:
  port: 8080
  # 스레드 상한 — t3.small(2GB) 네이티브 메모리 보호. 기본 max=200 은 작은 박스엔 과해
  # 워커 스레드 스택만으로 네이티브 메모리를 고갈시킬 수 있다 (인시던트 2026-06-13).
  tomcat:
    threads:
      max: 50
      min-spare: 5
    accept-count: 100
    max-connections: 2000

spring:
  application:
    name: palette

  # Database Configuration
  datasource:
    url: jdbc:h2:file:./data/palettedb;AUTO_SERVER=TRUE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # 커넥션 풀 명시 상한 (prod MySQL 은 env 로 url 만 override, hikari 설정은 공통 적용)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000   # 10s — 풀 고갈 시 무한 대기 대신 빠르게 실패
      max-lifetime: 600000        # 10m
      keepalive-time: 120000      # 2m

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
              - account_email
              - name
              - birthday
              - birthyear
              - gender
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# JWT Configuration
jwt:
  # JWT_SECRET must be set via environment variable. No fallback is provided intentionally.
  # Generate with: openssl rand -base64 64
  secret: ${JWT_SECRET}
  access-token-expiry: 3600       # 1 hour in seconds
  refresh-token-expiry: 2592000   # 30 days in seconds

# App Configuration
app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  # 베타 게이트 — 값이 있으면 회원가입 시 코드 검증, 빈 값이면 비활성
  beta-code: ${BETA_CODE:}
  # 베타 과금 정책 (BetaPolicy) — true 면 물감 소비(프로필 열람·소개 요청) 전면 무료, 결제/충전 유도 숨김.
  # 정식 출시 시 BETA_FREE_UNLOCK=false 로 끄면 PointPrice 단가대로 정상 과금.
  beta:
    free-unlock: ${BETA_FREE_UNLOCK:true}
  # 주선자 출금 어뷰징 방지 (ADR 0023) — holding 기간 + 한도 + 신규계정 cooldown
  withdrawal:
    holding-days: ${WITHDRAWAL_HOLDING_DAYS:14}
    min-amount: ${WITHDRAWAL_MIN_AMOUNT:5000}
    daily-limit: ${WITHDRAWAL_DAILY_LIMIT:200000}
    monthly-limit: ${WITHDRAWAL_MONTHLY_LIMIT:1000000}
    account-min-age-days: ${WITHDRAWAL_ACCOUNT_MIN_AGE_DAYS:7}

# AWS S3 Configuration
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:palette-data-v1}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:dummy-access-key}
    secret-key: ${AWS_SECRET_ACCESS_KEY:dummy-secret-key}

# NCP SENS SMS Configuration
ncp:
  sens:
    access-key: ${NCP_SENS_ACCESS_KEY:dummy-access-key}
    secret-key: ${NCP_SENS_SECRET_KEY:dummy-secret-key}
    service-id: ${NCP_SENS_SERVICE_ID:dummy-service-id}
    from-number: ${NCP_SENS_FROM_NUMBER:01000000000}

# NICE 본인인증 API v2.0
# 미설정 시 DEV bypass 모드로 동작 (NICE 팝업 없이 수동 입력)
nice:
  client-id: ${NICE_CLIENT_ID:}
  client-secret: ${NICE_CLIENT_SECRET:}
  product-id: ${NICE_PRODUCT_ID:2101979031}

# ── 결제 (PA-002) ────────────────────────────────────────
# PAYMENT_GATEWAY: mock (베타 기본) | toss (test/live 키 필요)
# TOSS_SECRET_KEY: 가맹 신청 후 콘솔에서 발급 — test_sk_... / live_sk_...
payment:
  gateway: ${PAYMENT_GATEWAY:mock}

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY:dummy}

# Logging
logging:
  level:
    kr.ai.palette: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
