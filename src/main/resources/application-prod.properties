# ===== PROD Profile =====
# MySQL — set env vars before deploying
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:palette}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
# Hibernate dialect 명시 (Spring Boot 4: spring.jpa.database-platform 보다 안정적)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hibernate 7.2 + MySQL 의 ddl-auto=update 부팅 시 SEQUENCES 조회 버그 우회:
# Hibernate 의 schema management 완전 비활성, schema.sql 로 부트스트랩
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Nginx 가 X-Forwarded-Proto / X-Forwarded-Host 헤더로 원본 요청 정보 전달
# → Spring 이 OAuth2 redirect_uri 등을 https://www.palette.ai.kr 로 생성하도록
server.forward-headers-strategy=framework

# Spring SQL 초기화 — 초기 스키마 + 누락 분 보충 (idempotent migrations)
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.schema-locations=classpath:db/schema-mysql.sql,classpath:db/schema-mysql-migrations.sql
spring.sql.init.continue-on-error=true
# JPA 초기화를 SQL 초기화 후로 미룸 (테이블 만든 후 JPA 가 검증)
spring.jpa.defer-datasource-initialization=true

# H2 Console disabled in prod
spring.h2.console.enabled=false

# Storage - S3
aws.s3.enabled=true
aws.s3.bucket=${S3_BUCKET_NAME}
aws.s3.region=${AWS_REGION:ap-northeast-2}
aws.access-key=${AWS_ACCESS_KEY_ID}
aws.secret-key=${AWS_SECRET_ACCESS_KEY}

# SMS - NCP SENS
sms.provider=${SMS_PROVIDER:mock}

# 베타 단계: 휴대폰 인증 우회 (SMS 안 보내고 자동 통과)
# 정식 출시 시 false 로 변경 + SMS_PROVIDER=ncp + NCP 키 채우기
app.phone-verification-bypass=${PHONE_VERIFICATION_BYPASS:true}
ncp.sens.access-key=${NCP_ACCESS_KEY}
ncp.sens.secret-key=${NCP_SECRET_KEY}
ncp.sens.service-id=${NCP_SENS_SERVICE_ID}
ncp.sens.from-number=${NCP_SENS_FROM_NUMBER}

# Payment - Toss Payments
payment.gateway=toss
toss.payments.client-key=${TOSS_CLIENT_KEY}
toss.payments.secret-key=${TOSS_SECRET_KEY}

# Redis (Refresh Token 저장)
spring.data.redis.enabled=true
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Push Notifications - FCM
push.provider=fcm
# 아래 중 하나를 설정:
# 1. 서비스 계정 키 파일 경로
firebase.service-account-key-path=${FIREBASE_SERVICE_ACCOUNT_KEY_PATH:}
# 2. 서비스 계정 키 JSON 내용 (환경변수로 주입)
firebase.service-account-key-json=${FIREBASE_SERVICE_ACCOUNT_KEY_JSON:}

# NICE 본인인증
nice.client-id=${NICE_CLIENT_ID}
nice.client-secret=${NICE_CLIENT_SECRET}
nice.product-id=${NICE_PRODUCT_ID:2101979031}

# App URL (NICE 콜백)
app.base-url=https://api.palette.kr

# CORS — 웹(실도메인) + iOS/Android Capacitor 네이티브 origin(교차출처 API 호출).
# 네이티브 WebView 는 capacitor://localhost / palette://localhost (ios.scheme) origin 으로 요청 → 미허용 시 인증/가입 차단됨.
cors.allowed-origins=https://palette.ai.kr,https://www.palette.ai.kr,https://palette.kr,https://www.palette.kr,capacitor://localhost,https://localhost,palette://localhost

# ===== 보안 하드닝 (배포 전 점검) =====
# 모의 시드 비활성 (운영자 계정만 보장). 데모 계정 필요 시 app.seed-enabled=true + ADMIN_SEED_PASSWORD 설정
app.seed-enabled=${APP_SEED_ENABLED:true}
# 운영자 시드 비밀번호 — 반드시 강한 값으로 주입 (미설정 시 부팅은 되나 약한 기본값 사용 → 즉시 교체)
app.admin-seed-password=${ADMIN_SEED_PASSWORD:adminpass123}
# NICE dev-bypass 는 prod 에서 차단
app.nice-dev-bypass-enabled=false

# prod 로그 레벨 — DEBUG(SQL/시큐리티/JWT 클레임) 노출 차단
logging.level.kr.ai.palette=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Swagger/OpenAPI 문서 prod 비공개 (전체 API 맵 노출 방지)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# 업로드 크기 상한 (서버측)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
