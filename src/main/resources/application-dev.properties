# ===== DEV Profile =====
# MySQL (서버 docker-compose 환경)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:palette}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:palette}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console disabled in dev server
spring.h2.console.enabled=false

# Storage - local /tmp
aws.s3.enabled=false

# SMS - mock (logs to console, always succeeds)
sms.provider=mock

# Payment - mock (always succeeds)
payment.gateway=mock

# OpenAI (dev: 환경변수 없으면 placeholder로 기동, 실제 호출 시에만 오류)
openai.api-key=${OPENAI_API_KEY:dev-placeholder-key}

# Redis 자동설정 비활성화 (dev는 InMemory 사용)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:8080
