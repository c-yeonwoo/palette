# ===== DEV Profile =====
# H2 in-file database
spring.datasource.url=jdbc:h2:file:./data/palettedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Storage - local /tmp
aws.s3.enabled=false

# SMS - mock (logs to console, always succeeds)
sms.provider=mock

# Payment - mock (always succeeds)
payment.gateway=mock

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:8080
