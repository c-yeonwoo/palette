
  <!DOCTYPE html>
  <html lang="ko">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
      <title>Palette - 나의 색을 찾고, 너의 색과 조화를 이루다</title>
      <meta name="description" content="신뢰할 수 있는 지인 네트워크 기반 데이팅 서비스" />

      <!-- PWA — iOS Safari "홈 화면에 추가" 지원 -->
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="default" />
      <meta name="apple-mobile-web-app-title" content="Palette" />
      <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

      <!-- PWA — 테마 색상 (Android 상단바, 브라우저 탭) -->
      <meta name="theme-color" content="#F97316" />

      <!-- Open Graph (카카오톡/페북 공유 시 미리보기) -->
      <meta property="og:title" content="Palette — 지인이 보증하는 만남" />
      <meta property="og:description" content="나의 색을 찾고, 너의 색과 조화를 이루다" />
      <meta property="og:image" content="/og-image.png" />
      <meta property="og:url" content="https://www.palette.ai.kr" />
      <meta property="og:type" content="website" />

      <!-- Pretendard 폰트 -->
      <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />

      <!-- Kakao SDK -->
      <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"
        integrity="sha384-l+xbElFSnPZ2rOaPrU//2FF5B4LB8FiX5q4fXYTlfcG4PGpMkE1vcL7kNXI6Cci0"
        crossorigin="anonymous"></script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
