# ── HTTP → HTTPS 리다이렉트 + ACME challenge ──────────────────────────────────
server {
    listen 80;
    server_name www.palette.ai.kr palette.ai.kr;

    # Let's Encrypt 갱신용 (HTTP-01 challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모두 HTTPS로 리다이렉트
    location / {
        return 301 https://www.palette.ai.kr$request_uri;
    }
}

# ── 메인 HTTPS 서버 ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name www.palette.ai.kr;

    ssl_certificate     /etc/letsencrypt/live/www.palette.ai.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.palette.ai.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (1년)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /oauth2/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /login/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://api:8080/actuator/health;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
