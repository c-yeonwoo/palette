name: Deploy — Dev (disabled)

# ────────────────────────────────────────────────────────────────────────────
# 비활성 상태: 솔로 개발 단계에선 dev 서버 운영 안 함.
# 별도 dev 환경 필요해지면 아래 `workflow_dispatch` 만 두고 수동 실행하거나,
# `push: branches: [main]` 트리거를 복원할 것.
# ────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:   # 수동 실행 전용 (Actions 탭에서 Run workflow 버튼)

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: c-yeonwoo
  IMAGE_TAG: dev

jobs:
  # ── 1. Build & push images ───────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set SHA tag
        id: meta
        run: echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Backend
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-api:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      # Frontend
      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-frontend:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── 2. Deploy to dev EC2 ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-push
    environment: dev          # GitHub Environment — secrets 관리 여기서

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/palette

            # 0. 디스크 공간 확보 (prod 와 동일 — 누적 이미지로 디스크 부족 방어)
            echo "── disk before prune ──"
            df -h / | head -3
            docker container prune -f 2>&1 | tail -2 || true
            docker image prune -af 2>&1 | tail -2 || true
            docker builder prune -af 2>&1 | tail -2 || true
            docker volume prune -f 2>&1 | tail -2 || true
            echo "── disk after prune ──"
            df -h / | head -3

            # 1. .env 갱신
            echo "${{ secrets.DEV_ENV_FILE }}" > .env

            # 2. IMAGE_TAG 를 .env 에 영구 기록 (수동 재시작 대비)
            sed -i '/^IMAGE_TAG=/d' .env
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env

            # 3. pull + restart
            docker compose -f docker-compose.server.yml pull
            docker compose -f docker-compose.server.yml up -d --remove-orphans

            # 4. 배포 후 직전 버전 이미지 prune
            docker image prune -af 2>&1 | tail -2 || true

      - name: Notify success
        if: success()
        run: echo "✅ Dev deploy complete — ${{ needs.build-push.outputs.sha_tag }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Dev deploy failed"
