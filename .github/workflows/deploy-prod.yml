name: Deploy — Prod

on:
  push:
    branches: [main]   # main push 시 즉시 배포 (가장 흔한 경로)
    tags:
      - "v*"           # v1.0.0 등 태그 push 시도 배포 (버전 마커 + 롤백용)
  workflow_dispatch:   # GitHub Actions UI 수동 실행

env:
  REGISTRY: ghcr.io
  OWNER: c-yeonwoo

jobs:
  # ── 1. Build & push images ───────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      # 이미지 태그 결정:
      #   - 태그 push (v0.1.x) → 태그명 그대로 사용
      #   - main push → main-<sha7> 형식 (예: main-abc1234)
      #   - workflow_dispatch → manual-<sha7>
      - name: Extract image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
              echo "value=manual-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            else
              echo "value=main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-api:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=api-prod
          cache-to: type=gha,scope=api-prod,mode=max

      # Frontend
      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-frontend:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,scope=frontend-prod,mode=max

  # ── 2. Deploy to prod EC2 ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build-push
    environment: prod          # GitHub Environment — 수동 승인(protection rule) 설정 권장

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/palette

            # 0. 디스크 공간 확보 — 누적 이미지로 No space left on device 발생 이력 (#33 등)
            #    pull 전에 prune 으로 공간 확보. 사용 중 이미지/볼륨은 자동 보호됨.
            echo "── disk before prune ──"
            df -h / | head -3
            docker container prune -f 2>&1 | tail -2 || true
            docker image prune -af 2>&1 | tail -2 || true     # -a: 컨테이너 미참조 이미지까지
            docker builder prune -af 2>&1 | tail -2 || true   # buildx 캐시
            docker volume prune -f 2>&1 | tail -2 || true     # 사용 중 볼륨은 자동 제외
            echo "── disk after prune ──"
            df -h / | head -3

            # 1. PROD_ENV_FILE 시크릿으로 .env 갱신
            echo "${{ secrets.PROD_ENV_FILE }}" > .env

            # 2. 이번 배포의 IMAGE_TAG 를 .env 에 영구 기록
            #    (수동 재시작 시에도 정확한 버전이 뜨도록)
            sed -i '/^IMAGE_TAG=/d' .env
            echo "IMAGE_TAG=${{ needs.build-push.outputs.tag }}" >> .env

            # 3. pull + restart
            docker compose -f docker-compose.server.yml pull
            docker compose -f docker-compose.server.yml up -d --remove-orphans

            # 4. 배포 후에도 한번 더 prune — 직전 버전 이미지 정리
            docker image prune -af 2>&1 | tail -2 || true

      - name: Create GitHub Release note
        if: success()
        run: |
          echo "🚀 Prod deploy complete — ${{ needs.build-push.outputs.tag }}"
