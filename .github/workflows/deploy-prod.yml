name: Deploy — Prod

on:
  push:
    tags:
      - "v*"           # v1.0.0, v1.2.3 형태 태그 시 실행

env:
  REGISTRY: ghcr.io
  OWNER: c-yeonwoo

jobs:
  # ── 1. Build & push images ───────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-api:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=api-prod
          cache-to: type=gha,scope=api-prod,mode=max

      # Frontend
      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/palette-frontend:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,scope=frontend-prod,mode=max

  # ── 2. Deploy to prod EC2 ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build-push
    environment: prod          # GitHub Environment — 수동 승인(protection rule) 설정 권장

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/palette

            echo "${{ secrets.PROD_ENV_FILE }}" > .env
            export IMAGE_TAG=${{ needs.build-push.outputs.tag }}

            docker compose -f docker-compose.server.yml pull
            docker compose -f docker-compose.server.yml up -d --remove-orphans
            docker image prune -f

      - name: Create GitHub Release note
        if: success()
        run: |
          echo "🚀 Prod deploy complete — ${{ needs.build-push.outputs.tag }}"
