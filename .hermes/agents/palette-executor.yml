# ============================================================================
# Palette Executor (Hermes agent)
# ============================================================================
# `ah:needs-execution` issue 1건 → ReAct + edit + worktree + PR.
#
# 핵심 결정: ReAct / tool-use 는 Hermes 가 아니라 agentic-harness 의
# orchestrator.agents.run_code_executor() 가 처리. 이 yaml 은 그 함수를
# Python entrypoint 로 호출하는 shim.
#
# 사유:
#   - agentic-harness 가 ReAct + edit action + worktree + git_apply + Closes #N
#     + cost 추적까지 이미 검증된 logic. 재구현 risk 회피.
#   - Hermes 는 scheduler + lifecycle (격리/타임아웃/로그) 만.
#   - prompt 의 핵심 설계 결정 (변경 금지) 8개 항목 모두 그 코드가 이미 준수.
# ============================================================================

name: palette-executor
description: Issue 받아 코드 변경 + 테스트 + PR 생성 (ReAct + edit action)

sandbox: docker          # 실제 commit/push — 격리 필수
sandbox_config:
  image: eclipse-temurin:21-jdk
  setup: |
    set -e
    apt-get update && apt-get install -y --no-install-recommends \
      git gh nodejs npm curl python3 python3-venv python3-pip jq
    # agentic-harness 코드 — host 마운트 또는 fresh clone (host 마운트가 빠름)
    test -d /opt/agentic-harness || (
      git clone https://x-access-token:${PALETTE_AGENT_PAT}@github.com/c-yeonwoo/agentic-harness.git /opt/agentic-harness
    )
    cd /opt/agentic-harness && pip install -e . --quiet
    # palette repo — fresh clone (worktree 는 이 안에서 만듦)
    mkdir -p /workspace
    cd /workspace
    test -d palette || git clone https://x-access-token:${PALETTE_AGENT_PAT}@github.com/c-yeonwoo/palette.git
    cd palette
    git config user.email "agent@palette.local"
    git config user.name  "palette-executor"
  mounts:
    - host: /tmp/palette-agent-workspaces
      container: /workspace
    # agentic-harness 를 host 에서 마운트하면 dev 반영 빠름 — Phase B 에서 결정
    # - host: /Users/ys.choi/dev/agentic-harness
    #   container: /opt/agentic-harness

env:
  GITHUB_TOKEN: ${PALETTE_AGENT_PAT}
  GH_REPO: c-yeonwoo/palette
  REPO_CWD: /workspace/palette
  # sk-ant-oat... OAuth token 은 SDK 의 auth_token 으로 — claude.py 가 처리
  ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}      # api_key path 도 지원
  EXECUTOR_MODEL: claude-haiku-4-5
  EXECUTOR_COST_CAP: "1.50"
  # 로컬 테스트용 dummy — prod 키 절대 주입 X
  JWT_SECRET: dGVzdC1zZWNyZXQtZm9yLWNpLW9ubHk=
  KAKAO_CLIENT_ID: dummy-ci-key
  KAKAO_CLIENT_SECRET: dummy-ci-secret
  OPENAI_API_KEY: dummy-ci-openai-key
  SPRING_PROFILES_ACTIVE: local

tools:
  - bash

timeout: 30m

# 입력: {"number": <issue_number>}
# Hermes 가 입력을 env (HERMES_INPUT) 또는 stdin 으로 전달 — schema 확인 후 정정
prompt: |
  너는 Palette 의 자동 실행 워커 shim 이다. 아래 정확히 실행하라.

  ## 0. 입력 파싱
  ```bash
  ISSUE_N=$(echo "$HERMES_INPUT" | jq -r '.number')
  if [ -z "$ISSUE_N" ] || [ "$ISSUE_N" = "null" ]; then
    echo "❌ HERMES_INPUT 에 .number 없음" >&2; exit 1
  fi
  ```

  ## 1. agentic-harness entrypoint 호출
  ```bash
  cd /opt/agentic-harness
  python -c "
  import asyncio, os, sys
  from pathlib import Path
  from orchestrator import agents, gh, source_of_truth as sot_mod

  async def main():
      repo = os.environ['GH_REPO']
      issue_n = int(os.environ['ISSUE_N'])
      issue = await gh.get_issue(repo, issue_n)
      sot = sot_mod.SourceOfTruth.from_cwd(Path(os.environ['REPO_CWD']))
      bot_user = await gh.whoami()
      ok = await agents.run_code_executor(
          repo=repo,
          issue=issue,
          sot=sot,
          bot_user=bot_user,
          repo_cwd=Path(os.environ['REPO_CWD']),
      )
      sys.exit(0 if ok else 1)

  asyncio.run(main())
  " 2>&1
  EXIT=$?
  ```

  ## 2. 락 해제 (성공/실패 모두)
  성공 시 agents.run_code_executor 가 이미 ah:needs-execution 라벨을 제거하고
  PR 에 ah:needs-review 부여함. 단 issue 의 `ah:in-progress` 락은 PM 이 부여한
  것이므로 여기서 명시적으로 해제:
  ```bash
  gh issue edit $ISSUE_N --repo $GH_REPO --remove-label "ah:in-progress" || true
  ```
  실패 시 (EXIT != 0) issue 에 코멘트는 agents.run_code_executor 가 이미 부착함.
  추가로 `ah:awaiting-human` 부여:
  ```bash
  if [ $EXIT -ne 0 ]; then
    gh issue edit $ISSUE_N --repo $GH_REPO --add-label "ah:awaiting-human" || true
  fi
  exit $EXIT
  ```

  ## 절대 금지 (agentic-harness 가 이미 준수하지만 재명시)
  - main 직접 push
  - .env / 시크릿 commit
  - data/ 디렉토리 commit
  - 테스트 실패 상태로 push (agentic-harness 가 git_apply 단계에서 막음)
