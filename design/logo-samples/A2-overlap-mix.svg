<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 컨셉 A': 두 색의 겹침 + 교집합이 제3의 색 (색 섞임 명시) -->
  <rect width="512" height="512" rx="116" fill="#F4EFE7"/>
  <defs>
    <clipPath id="leftCircle">
      <circle cx="206" cy="256" r="118"/>
    </clipPath>
  </defs>
  <circle cx="206" cy="256" r="118" fill="#E07A5F"/>   <!-- terracotta -->
  <circle cx="306" cy="256" r="118" fill="#4F7CAC"/>   <!-- dusty blue -->
  <!-- 교집합(lens) = 두 색이 섞인 제3색 (muted plum) -->
  <g clip-path="url(#leftCircle)">
    <circle cx="306" cy="256" r="118" fill="#7E5E76"/>
  </g>
</svg>
